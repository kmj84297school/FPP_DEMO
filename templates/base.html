<!-- templates/base.html -->
<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Scout Visual — Player Potential AI</title>
  <!-- Tailwind (CDN) : 발표용 간단 적용 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/style.css"/>
</head>
<body class="bg-slate-50 text-slate-900">
  <header class="bg-slate-900 text-white">
    <div class="max-w-6xl mx-auto py-4 px-4 flex items-center justify-between">
      <h1 class="text-xl font-bold">⚽ Scout Visual — Player Potential AI</h1>
      <span class="text-sm opacity-80">실시간 분석 + 캐시 증명</span>
    </div>
  </header>
  <main class="max-w-6xl mx-auto px-4 py-6">
    {% block content %}{% endblock %}
  </main>
  <footer class="max-w-6xl mx-auto px-4 py-8 text-xs text-slate-500">
    데이터 출처: 공개 축구 통계(FBref). 분석·시각화 로직은 프로젝트 코드 기반. (연구/교육 목적) 
  </footer>
</body>
</html>
